name: Build & Patch WhatsApp

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-smali:
    name: Build Smali Generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x smali_generator/gradlew

      - name: Build smali_generator (Gradle assembleRelease)
        working-directory: smali_generator
        run: ./gradlew assembleRelease

      - name: Upload smali_generator APK
        uses: actions/upload-artifact@v4
        with:
          name: smali_generator_apk
          path: smali_generator/smali_generator.apk

  patch-apk:
    name: Patch WhatsApp APK
    runs-on: ubuntu-latest
    needs: build-smali
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download smali_generator APK
        uses: actions/download-artifact@v4
        with:
          name: smali_generator_apk
          path: smali_generator/

      - name: Patch WhatsApp APK
        run: |
          # Copy target APK (bisa ditambahkan ke repo atau download dari URL)
          echo "Patching WhatsApp APK..."
          # TODO: ganti path ke APK WhatsApp yang tersedia
          # python patch_whatsapp.py -p ./WhatsApp.apk -o ./PatchedWhatsApp.apk
          echo "Patch APK step ready — upload APK WhatsApp as artifact first"

      - name: Upload Patched APK
        if: false  # enable setelah APK target tersedia
        uses: actions/upload-artifact@v4
        with:
          name: PatchedWhatsApp
          path: PatchedWhatsApp.apk
